<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ELWOIC Data Request Form</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
body {
    font-family: "Times New Roman", serif;
    background: #f2f2f2;
    padding: 20px;
}

.container {
    width: 800px;
    margin: auto;
    background: white;
    padding: 40px;
    border: 1px solid #000;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    width: 80px;
    height: 80px;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
}

.logo img, .small-logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.title {
    text-align: center;
    margin-top: 10px;
}

.subtitle {
    font-size: 14px;
}

.form-group {
    margin-top: 20px;
}

label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
}

input, textarea, select {
    width: 100%;
    padding: 8px;
    border: 1px solid #000;
    font-family: inherit;
    font-size: 14px;
    box-sizing: border-box;
    background: white;
}

textarea {
    height: 80px;
    resize: vertical;
}

.row {
    display: flex;
    gap: 20px;
}

.row .form-group {
    flex: 1;
}

/* Date fields toggle */
.date-section {
    display: none;
}
.date-section.visible {
    display: block;
}

/* Pre-submit */
.pre-submit-area {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
}

.small-logo {
    width: 60px;
    height: 60px;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
}

.cutting-line {
    width: 100%;
    border-top: 1px dashed #000;
    margin: 20px 0;
    position: relative;
}

.cutting-line::after {
    content: "✂ Cut here for physical submission";
    position: absolute;
    right: 0;
    top: -12px;
    font-size: 10px;
    background: white;
    padding: 0 5px;
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
    font-family: inherit;
    font-size: 14px;
    transition: background 0.2s;
}

button:hover {
    background: #333;
}

button:disabled {
    background: #999;
    cursor: not-allowed;
}

.pdf-btn {
    background: #444;
    margin-bottom: 5px;
}

.pdf-btn:hover {
    background: #222;
}

.checkbox-line {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 15px;
}

.checkbox-line input[type="checkbox"] {
    width: auto;
    padding: 0;
}

.note {
    font-size: 12px;
    margin-top: 5px;
    color: #555;
}

.success-msg {
    display: none;
    margin-top: 15px;
    padding: 12px;
    background: #e6ffe6;
    border: 1px solid #006600;
    color: #006600;
    font-size: 14px;
    text-align: center;
}

.error-msg {
    display: none;
    margin-top: 15px;
    padding: 12px;
    background: #ffe6e6;
    border: 1px solid #cc0000;
    color: #cc0000;
    font-size: 14px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container" id="form-content">

    <div class="header">
        <div class="logo">
            <img src="images/ELWOIC.png" alt="Logo 1">
        </div>
        <div class="logo">
            <img src="images/Elamkulam Weather Logo Design.1.png" alt="Logo 2">
        </div>
    </div>

    <div class="title">
        <h2>ELWOIC</h2>
        <div class="subtitle">
            Elamkulam Local Weather Observation and Information Centre<br>
            Data Request Application Form
        </div>
    </div>

    <form id="dataRequestForm">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Email (Required)</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Phone / WhatsApp (Optional)</label>
                <input type="text" name="phone">
            </div>
        </div>

        <div class="form-group">
            <label>Purpose of Data Request</label>
            <textarea name="purpose" required></textarea>
        </div>

        <div class="form-group">
            <label>Required Parameters</label>
            <input type="text" name="parameters"
                placeholder="e.g., Temperature, Humidity, Wind, Rainfall, Pressure, PM2.5 / AQI"
                required>
        </div>

        <!-- Type of Request — drives which date fields show -->
        <div class="form-group">
            <label>Type of Request</label>
            <select name="type" id="requestType" required onchange="toggleDateFields()">
                <option value="">-- Select Request Type --</option>
                <option value="Specific Date & Time">Specific Date &amp; Time</option>
                <option value="Date Range">Date Range</option>
            </select>
        </div>

        <!-- Specific Date & Time fields -->
        <div class="date-section row" id="specificDateSection">
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" id="specificDate">
            </div>
            <div class="form-group">
                <label>Time</label>
                <input type="time" name="time" id="specificTime">
            </div>
        </div>

        <!-- Date Range fields -->
        <div class="date-section row" id="dateRangeSection">
            <div class="form-group">
                <label>From Date</label>
                <input type="date" name="from_date" id="fromDate">
            </div>
            <div class="form-group">
                <label>To Date</label>
                <input type="date" name="to_date" id="toDate">
            </div>
        </div>

        <div class="form-group">
            <label>Additional Details if any</label>
            <textarea name="additional_details" placeholder="Enter any extra information here..."></textarea>
        </div>

        <div class="form-group">
            <label>Declaration</label>
            <textarea readonly>I hereby request weather data from ELWOIC for the purpose mentioned above.
I agree that the data will be used only for educational and non-commercial purposes.</textarea>

            <div class="checkbox-line">
                <input type="checkbox" id="agree" required>
                <label for="agree">I agree and digitally sign this request</label>
            </div>

            <div class="note">
                By ticking the above box, you are digitally signing this application form.
            </div>
        </div>

        <div class="pre-submit-area">
            <div class="small-logo">
                <img src="images/⭐.png" alt="Logo 3">
            </div>
        </div>

        <div class="cutting-line"></div>

        <button type="button" class="pdf-btn" onclick="downloadPDF()">Download as PDF</button>
        <button type="submit" id="submitBtn">Submit Request</button>

        <div class="success-msg" id="successMsg"></div>
        <div class="error-msg" id="errorMsg"></div>

    </form>

</div>

<script>
// ── Worker URL — only thing you set here ──────────────────
const WORKER_URL = "https://data-request-handler.bold-waterfall-0d01.workers.dev/";

// ── Show / hide date fields based on request type ─────────
function toggleDateFields() {
    const type = document.getElementById("requestType").value;

    const specificSection = document.getElementById("specificDateSection");
    const rangeSection    = document.getElementById("dateRangeSection");

    // Hide both first
    specificSection.classList.remove("visible");
    rangeSection.classList.remove("visible");

    // Clear all date/time values when switching
    document.getElementById("specificDate").value = "";
    document.getElementById("specificTime").value = "";
    document.getElementById("fromDate").value     = "";
    document.getElementById("toDate").value       = "";

    if (type === "Specific Date & Time") {
        specificSection.classList.add("visible");
    } else if (type === "Date Range") {
        rangeSection.classList.add("visible");
    }
}

// ── PDF Download ──────────────────────────────────────────
function downloadPDF() {
    window.location.href = "ELWOIC_Styled_Form.pdf";
}

// ── Form Submit ───────────────────────────────────────────
document.getElementById("dataRequestForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const submitBtn = document.getElementById("submitBtn");
    const successMsg = document.getElementById("successMsg");
    const errorMsg   = document.getElementById("errorMsg");

    successMsg.style.display = "none";
    errorMsg.style.display   = "none";
    submitBtn.disabled       = true;
    submitBtn.textContent    = "Submitting...";

    const data = {
        name:               this.name.value.trim(),
        email:              this.email.value.trim(),
        phone:              this.phone.value.trim(),
        purpose:            this.purpose.value.trim(),
        parameters:         this.parameters.value.trim(),
        type:               this.type.value,
        date:               this.date.value               || null,
        time:               this.time.value               || null,
        from_date:          this.from_date.value          || null,
        to_date:            this.to_date.value            || null,
        additional_details: this.additional_details.value.trim()
    };

    try {
        const res = await fetch(WORKER_URL, {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok && result.success) {
            successMsg.textContent = `Request submitted successfully! Your Request ID is: ${result.request_id}`;
            successMsg.style.display = "block";
            this.reset();
            toggleDateFields(); // reset date fields visibility
        } else {
            throw new Error(result.error || "Submission failed");
        }

    } catch (err) {
        errorMsg.textContent = "Submission failed. Please try again or contact us directly.";
        errorMsg.style.display = "block";
        console.error(err);
    } finally {
        submitBtn.disabled    = false;
        submitBtn.textContent = "Submit Request";
    }
});
</script>

</body>
</html>
