<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELWOIC Data Portal</title>
    <style>
        /* Modern Navigation Bar */
        nav {
            background: #003a63;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 25px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            padding: 5px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }

        nav a:hover, nav a.active {
            background: rgba(255, 255, 255, 0.2);
            color: #ffa500;
        }

        /* Container for the Pages */
        .content-frame {
            width: 100%;
            height: calc(100vh - 60px); /* Full height minus nav bar */
            border: none;
            margin-top: 60px;
            display: none; /* Hidden by default */
        }

        .active-frame {
            display: block;
        }

        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <nav>
        <a onclick="showSection('why')" id="btn-why">Why Database?</a>
        <a onclick="showSection('form')" id="btn-form">Request Data</a>
        <a onclick="showSection('search')" id="btn-search">Track Status</a>
    </nav>

    <iframe src="why database.html" id="frame-why" class="content-frame active-frame"></iframe>

    <iframe src="request-form.html" id="frame-form" class="content-frame"></iframe>

    <iframe src="request search.html" id="frame-search" class="content-frame"></iframe>

    <script>
        function showSection(sectionId) {
            // Hide all frames
            document.querySelectorAll('.content-frame').forEach(f => f.classList.remove('active-frame'));
            // Remove active style from buttons
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));

            // Show selected frame
            document.getElementById('frame-' + sectionId).classList.add('active-frame');
            // Highlight selected button
            document.getElementById('btn-' + sectionId).classList.add('active');
        }
        
        // Initialize the first button as active
        document.getElementById('btn-why').classList.add('active');
    </script>

</body>
</html>
