<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELWOIC Data Request Form</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
body {
    font-family: "Times New Roman", serif;
    background: #f2f2f2;
    padding: 20px;
}

.container {
    width: 800px;
    margin: auto;
    background: white;
    padding: 40px;
    border: 1px solid #000;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    width: 80px;
    height: 80px;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
}

.logo img, .small-logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.title {
    text-align: center;
    margin-top: 10px;
}

.subtitle {
    font-size: 14px;
}

/* Google One Tap hint banner */
.google-hint {
    display: none;
    margin-top: 8px;
    padding: 8px 12px;
    background: #f0f7ff;
    border: 1px solid #4285f4;
    border-radius: 4px;
    font-size: 12px;
    color: #1a73e8;
    align-items: center;
    gap: 8px;
}
.google-hint.visible {
    display: flex;
}
.google-hint-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
}
.google-hint button {
    margin: 0;
    padding: 3px 10px;
    width: auto;
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 3px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
}
.google-hint .dismiss {
    background: transparent;
    color: #999;
    font-size: 16px;
    padding: 0 4px;
    margin-left: auto;
}

.form-group {
    margin-top: 20px;
}

label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
}

.optional-label {
    font-weight: normal;
    font-size: 12px;
    color: #666;
    margin-left: 4px;
}

input, textarea, select {
    width: 100%;
    padding: 8px;
    border: 1px solid #000;
    font-family: inherit;
    font-size: 14px;
    box-sizing: border-box;
    background: white;
}

textarea {
    height: 80px;
    resize: vertical;
}

select {
    cursor: pointer;
}

.row {
    display: flex;
    gap: 20px;
}

.row .form-group {
    flex: 1;
}

/* Section divider */
.section-divider {
    margin-top: 28px;
    margin-bottom: 4px;
    border-top: 1px solid #ccc;
    padding-top: 18px;
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #555;
}

/* Date fields toggle */
.date-section {
    display: none;
}
.date-section.visible {
    display: block;
}

/* Pre-submit */
.pre-submit-area {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
}

.small-logo {
    width: 60px;
    height: 60px;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
}

.cutting-line {
    width: 100%;
    border-top: 1px dashed #000;
    margin: 20px 0;
    position: relative;
}

.cutting-line::after {
    content: "✂ Cut here for physical submission";
    position: absolute;
    right: 0;
    top: -12px;
    font-size: 10px;
    background: white;
    padding: 0 5px;
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
    font-family: inherit;
    font-size: 14px;
    transition: background 0.2s;
}

button:hover { background: #333; }
button:disabled { background: #999; cursor: not-allowed; }

.pdf-btn { background: #444; margin-bottom: 5px; }
.pdf-btn:hover { background: #222; }

.checkbox-line {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 15px;
}

.checkbox-line input[type="checkbox"] {
    width: auto;
    padding: 0;
}

.note {
    font-size: 12px;
    margin-top: 5px;
    color: #555;
}

.success-msg {
    display: none;
    margin-top: 15px;
    padding: 12px;
    background: #e6ffe6;
    border: 1px solid #006600;
    color: #006600;
    font-size: 14px;
    text-align: center;
}

.error-msg {
    display: none;
    margin-top: 15px;
    padding: 12px;
    background: #ffe6e6;
    border: 1px solid #cc0000;
    color: #cc0000;
    font-size: 14px;
    text-align: center;
}
</style>
</head>

<body>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<div class="container" id="form-content">

    <div class="header">
        <div class="logo">
            <img src="images/ELWOIC.png" alt="Logo 1">
        </div>
        <div class="logo">
            <img src="images/Elamkulam Weather Logo Design.1.png" alt="Logo 2">
        </div>
    </div>

    <div class="title">
        <h2>ELWOIC</h2>
        <div class="subtitle">
            Elamkulam Local Weather Observation and Information Centre<br>
            Data Request Application Form
        </div>
    </div>

    <form id="dataRequestForm" autocomplete="off">

        <!-- ── SECTION: PERSONAL DETAILS ───────────────── -->
        <div class="section-divider">Personal Details</div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required placeholder="As per official records">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Email Address <span style="color:red;">*</span></label>
                <input type="email" name="email" id="emailField" required placeholder="Your active email address">
                <!-- Google hint shown here -->
                <div class="google-hint" id="googleHint">
                    <img class="google-hint-icon" src="https://www.gstatic.com/images/branding/product/1x/googleg_16dp.png" alt="G">
                    <span id="googleHintText">Use your Google account email?</span>
                    <button type="button" onclick="applyGoogleEmail()">Use this</button>
                    <button type="button" class="dismiss" onclick="dismissHint()" title="Dismiss">×</button>
                </div>
            </div>
            <div class="form-group">
                <label>Phone / WhatsApp <span class="optional-label">(Optional)</span></label>
                <input type="text" name="phone" placeholder="+91 XXXXX XXXXX">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Organisation / Institution <span class="optional-label">(If any)</span></label>
                <input type="text" name="organisation" placeholder="e.g., Government College Kasaragod">
            </div>
            <div class="form-group">
                <label>Designation / Role <span class="optional-label">(If any)</span></label>
                <input type="text" name="designation" placeholder="e.g., Student, Researcher, Journalist">
            </div>
        </div>

        <!-- ── SECTION: REQUEST DETAILS ────────────────── -->
        <div class="section-divider">Request Details</div>

        <div class="form-group">
            <label>Purpose Category <span style="color:red;">*</span></label>
            <select name="purpose_category" required>
                <option value="">-- Select Category --</option>
                <option value="Research">Research</option>
                <option value="Education">Education</option>
                <option value="Personal">Personal</option>
                <option value="Commercial">Commercial</option>
                <option value="Government / Official">Government / Official</option>
                <option value="Media / Journalism">Media / Journalism</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Purpose of Data Request <span style="color:red;">*</span></label>
            <textarea name="purpose" required placeholder="Briefly describe why you need this data..."></textarea>
        </div>

        <div class="form-group">
            <label>Required Parameters <span style="color:red;">*</span></label>
            <input type="text" name="parameters" required
                placeholder="e.g., Temperature, Humidity, Wind Speed, Rainfall, Pressure, UV Index">
        </div>

        <div class="form-group">
            <label>Preferred Response Format <span class="optional-label">(Optional)</span></label>
            <select name="response_format">
                <option value="">-- Select Format --</option>
                <option value="PDF Report">PDF Report</option>
                <option value="CSV / Excel">CSV / Excel</option>
                <option value="JSON">JSON</option>
                <option value="Any">Any / No Preference</option>
            </select>
        </div>

        <!-- ── SECTION: DATE / TIME ─────────────────────── -->
        <div class="section-divider">Date &amp; Time of Data</div>

        <div class="form-group">
            <label>Type of Request <span style="color:red;">*</span></label>
            <select name="type" id="requestType" required onchange="toggleDateFields()">
                <option value="">-- Select Request Type --</option>
                <option value="Specific Date &amp; Time">Specific Date &amp; Time</option>
                <option value="Date Range">Date Range</option>
            </select>
        </div>

        <!-- Specific Date & Time -->
        <div class="date-section row" id="specificDateSection">
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" id="specificDate">
            </div>
            <div class="form-group">
                <label>Time <span class="optional-label">(Optional)</span></label>
                <input type="time" name="time" id="specificTime">
            </div>
        </div>

        <!-- Date Range -->
        <div class="date-section row" id="dateRangeSection">
            <div class="form-group">
                <label>From Date</label>
                <input type="date" name="from_date" id="fromDate">
            </div>
            <div class="form-group">
                <label>To Date</label>
                <input type="date" name="to_date" id="toDate">
            </div>
        </div>

        <div class="form-group">
            <label>Additional Details <span class="optional-label">(Optional)</span></label>
            <textarea name="additional_details" placeholder="Any specific requirements, time intervals, or other notes..."></textarea>
        </div>

        <!-- ── SECTION: DECLARATION ─────────────────────── -->
        <div class="section-divider">Declaration</div>

        <div class="form-group">
            <textarea readonly style="background:#f9f9f9; color:#333; height:70px;">I hereby request weather data from ELWOIC for the purpose mentioned above. I agree that the data will be used only for the stated purpose and will not be redistributed without prior permission from ELWOIC.</textarea>

            <div class="checkbox-line">
                <input type="checkbox" id="agree" required>
                <label for="agree">I agree and digitally sign this request</label>
            </div>

            <div class="note">
                By ticking the above box, you are digitally signing this application form.
            </div>
        </div>

        <div class="pre-submit-area">
            <div class="small-logo">
                <img src="images/⭐.png" alt="Logo 3">
            </div>
        </div>

        <div class="cutting-line"></div>

        <button type="button" class="pdf-btn" onclick="downloadPDF()">Download as PDF</button>
        <button type="submit" id="submitBtn">Submit Request</button>

        <div class="success-msg" id="successMsg"></div>
        <div class="error-msg" id="errorMsg"></div>

    </form>

</div>

<script>
// ── Config ────────────────────────────────────────────────
const WORKER_URL     = "https://data-request-handler.bold-waterfall-0d01.workers.dev/";
const FORMSPREE_URL  = "https://formspree.io/f/xpqybddq";
const GOOGLE_CLIENT  = "732370272836-2eqkp8g1m9gnj87c4i7hvjah0bnkdhhb.apps.googleusercontent.com"; // replace with your Google OAuth client ID

// ── Google One Tap — silently get email ───────────────────
let googleEmail = null;

window.addEventListener("load", () => {
    if (typeof google === "undefined") return;

    google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT,
        callback: handleGoogleCredential,
        auto_select: true,          // tries to auto-select if one account
        cancel_on_tap_outside: true
    });

    // Don't show the One Tap popup — just try to get credential silently
    google.accounts.id.prompt((notification) => {
        // We only use this for silent credential retrieval
        // If user dismisses, that's fine — they can type manually
    });
});

function handleGoogleCredential(response) {
    try {
        // Decode JWT payload (no verification needed — just reading email)
        const payload = JSON.parse(atob(response.credential.split(".")[1]));
        if (payload.email) {
            googleEmail = payload.email;
            const emailField = document.getElementById("emailField");

            // Only auto-fill if field is empty
            if (!emailField.value.trim()) {
                emailField.value = googleEmail;
            } else {
                // Field already has something — show hint instead
                showGoogleHint(googleEmail);
            }
        }
    } catch (e) {
        // Silent fail — user types manually
    }
}

function showGoogleHint(email) {
    const hint = document.getElementById("googleHint");
    document.getElementById("googleHintText").textContent = `Use ${email}?`;
    hint.classList.add("visible");
}

function applyGoogleEmail() {
    if (googleEmail) {
        document.getElementById("emailField").value = googleEmail;
    }
    dismissHint();
}

function dismissHint() {
    document.getElementById("googleHint").classList.remove("visible");
}

// ── Date fields toggle ────────────────────────────────────
function toggleDateFields() {
    const type = document.getElementById("requestType").value;
    const specificSection = document.getElementById("specificDateSection");
    const rangeSection    = document.getElementById("dateRangeSection");

    specificSection.classList.remove("visible");
    rangeSection.classList.remove("visible");

    document.getElementById("specificDate").value = "";
    document.getElementById("specificTime").value = "";
    document.getElementById("fromDate").value     = "";
    document.getElementById("toDate").value       = "";

    if (type === "Specific Date & Time") {
        specificSection.classList.add("visible");
    } else if (type === "Date Range") {
        rangeSection.classList.add("visible");
    }
}

// ── PDF Download ──────────────────────────────────────────
function downloadPDF() {
    window.location.href = "ELWOIC_Styled_Form.pdf";
}

// ── Form Submit ───────────────────────────────────────────
document.getElementById("dataRequestForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const submitBtn  = document.getElementById("submitBtn");
    const successMsg = document.getElementById("successMsg");
    const errorMsg   = document.getElementById("errorMsg");

    successMsg.style.display = "none";
    errorMsg.style.display   = "none";
    submitBtn.disabled       = true;
    submitBtn.textContent    = "Submitting...";

    const data = {
        name:               this.name.value.trim(),
        email:              this.email.value.trim(),
        phone:              this.phone.value.trim(),
        organisation:       this.organisation.value.trim(),
        designation:        this.designation.value.trim(),
        purpose_category:   this.purpose_category.value,
        purpose:            this.purpose.value.trim(),
        parameters:         this.parameters.value.trim(),
        response_format:    this.response_format.value,
        type:               this.type.value,
        date:               this.date.value               || null,
        time:               this.time.value               || null,
        from_date:          this.from_date.value          || null,
        to_date:            this.to_date.value            || null,
        additional_details: this.additional_details.value.trim()
    };

    try {
        // ── Worker (Supabase + EmailJS) ────────────────
        const res = await fetch(WORKER_URL, {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify(data)
        });

        const result = await res.json();

        if (!res.ok || !result.success) {
            throw new Error(result.error || "Submission failed");
        }

        // ── Formspree admin notification (frontend) ────
        fetch(FORMSPREE_URL, {
            method:  "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept":       "application/json"
            },
            body: JSON.stringify({
                _subject:         `New Data Request — ${result.request_id}`,
                request_id:       result.request_id,
                name:             data.name,
                email:            data.email,
                phone:            data.phone             || "Not Provided",
                organisation:     data.organisation      || "Not Provided",
                designation:      data.designation       || "Not Provided",
                purpose_category: data.purpose_category,
                purpose:          data.purpose,
                parameters:       data.parameters,
                response_format:  data.response_format   || "Not specified",
                type:             data.type,
                date:             data.date              || "N/A",
                time:             data.time              || "N/A",
                from_date:        data.from_date         || "N/A",
                to_date:          data.to_date           || "N/A",
                additional_details: data.additional_details || "None"
            })
        }).catch(() => {}); // silent fail — don't block success

        successMsg.innerHTML = `
            Request submitted successfully!<br>
            <strong>Your Request ID: ${result.request_id}</strong><br>
            <small>A confirmation email has been sent to ${data.email}</small>
        `;
        successMsg.style.display = "block";
        this.reset();
        toggleDateFields();

    } catch (err) {
        errorMsg.textContent = "Submission failed. Please try again or contact us directly at info@elwoic.in";
        errorMsg.style.display = "block";
        console.error(err);
    } finally {
        submitBtn.disabled    = false;
        submitBtn.textContent = "Submit Request";
    }
});
</script>

</body>
</html>
